<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<img src="images/logo.png" alt="Student Wellness Tracker Logo" class="logo">
<h1>Contact Us</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="features.html">Features</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<main>

<section>
<h2>Get in Touch</h2>

<form>
<label for="name">Name:</label>
<input type="text" id="name" name="name" required>

<label for="email">Email:</label>
<input type="email" id="email" name="email" required>

<label for="subject">Subject:</label>
<select id="subject" name="subject" required>
<option value="">-- Select a topic --</option>
<option value="feedback">Feedback</option>
<option value="support">Support</option>
<option value="partnership">Partnership</option>
<option value="other">Other</option>
</select>

<fieldset>
<legend>Preferred contact method:</legend>
<label><input type="radio" name="contact-method" value="email" checked> Email</label>
<label><input type="radio" name="contact-method" value="phone"> Phone</label>
<label><input type="radio" name="contact-method" value="none"> No reply needed</label>
</fieldset>

<label>
<input type="checkbox" id="newsletter" name="newsletter" value="yes">
Subscribe to wellness tips newsletter
</label>

<label for="message">Message:</label>
<textarea id="message" name="message" required></textarea>

<button type="submit">Send</button>
<button type="reset">Reset</button>
</form>

</section>

</main>

<footer>
<p>Student Wellness Tracker</p>
</footer>

</body>
</html>
