<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* --- Validation styles --- */
  .field-error {
    display: block;
    color: #c0392b;
    font-size: 0.85rem;
    margin-top: 3px;
    margin-bottom: 6px;
  }

  .input-invalid {
    border: 2px solid #c0392b !important;
    background-color: #fff5f5 !important;
  }

  /* --- Confirmation card --- */
  .confirmation-card {
    max-width: 560px;
    margin: 2rem auto;
    padding: 2rem;
    border: 2px solid #27ae60;
    border-radius: 10px;
    background: #f0fff4;
    text-align: center;
    font-family: inherit;
  }

  .confirm-icon {
    font-size: 3rem;
    color: #27ae60;
    margin-bottom: 0.5rem;
  }

  .confirmation-card h2 {
    color: #27ae60;
    margin-bottom: 0.5rem;
  }

  .confirm-intro {
    margin-bottom: 1.2rem;
    font-size: 1rem;
    color: #333;
  }

  .confirm-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 1.5rem;
  }

  .confirm-table th,
  .confirm-table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #c3e6cb;
    font-size: 0.95rem;
  }

  .confirm-table th {
    color: #555;
    font-weight: 600;
    width: 38%;
  }

  .confirm-table td {
    color: #222;
  }

  .confirm-message {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .btn-back {
    margin-top: 0.5rem;
    padding: 0.6rem 1.4rem;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .btn-back:hover {
    background: #219150;
  }
</style>
</head>

<body>

<header>
<img src="images/logo.png" alt="Student Wellness Tracker Logo" class="logo">
<h1>Contact Us</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="features.html">Features</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<main>

<section>
<h2>Get in Touch</h2>

<form novalidate>
<label for="name">Name:</label>
<input type="text" id="name" name="name">

<label for="email">Email:</label>
<input type="email" id="email" name="email">

<label for="subject">Subject:</label>
<select id="subject" name="subject">
<option value="">-- Select a topic --</option>
<option value="feedback">Feedback</option>
<option value="support">Support</option>
<option value="partnership">Partnership</option>
<option value="other">Other</option>
</select>

<fieldset>
<legend>Preferred contact method:</legend>
<label><input type="radio" name="contact-method" value="email" checked> Email</label>
<label><input type="radio" name="contact-method" value="phone"> Phone</label>
<label><input type="radio" name="contact-method" value="none"> No reply needed</label>
</fieldset>

<label>
<input type="checkbox" id="newsletter" name="newsletter" value="yes">
Subscribe to wellness tips newsletter
</label>

<label for="message">Message:</label>
<textarea id="message" name="message"></textarea>

<button type="submit">Send</button>
<button type="reset">Reset</button>
</form>

</section>

</main>

<footer>
<p>Student Wellness Tracker</p>
</footer>

<script src="main.js"></script>
</body>
</html>
